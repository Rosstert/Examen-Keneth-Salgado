<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Catalog-Z | Galería de Fotos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navegación Superior -->
    <nav class="navbar navbar-expand-lg navbar-light">
        <div class="container">
            <a class="navbar-brand" href="#">
                <i class="fas fa-film"></i> Catalog-Z
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#tmNavbar">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="tmNavbar">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active" href="#">Fotos</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Videos</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Contactos</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Sección Hero con Buscador -->
    <section class="hero-section">
        
        <div class="container d-flex justify-content-center">
            
            <form class="search-form"> 
                <input type="text" class="search-input" placeholder="Search">
                <button type="submit" class="search-button">
                    🔍
                    <i class="fas fa-search"></i>
                </button>
            </form>
        </div>
    </section>

    <!-- Galería Principal -->
    <main class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <h2 class="tm-text-primary">Ultimas fotos</h2>
            <div class="pagination-info">
                Page <input type="number" value="1" class="page-input"> of 10
            
            </div>
        </div>

        <div class="row">
            <!-- Item 1 -->
            <div class="col-xl-3 col-lg-4 col-md-6 col-sm-12 mb-5">
                <div class="gallery-card">
                    <div class="img-container">
                        <img src="https://picsum.photos/id/1/400/250" alt="Clocks">
                        <div class="img-overlay">
                            <i class="fas fa-expand"></i>
                        </div>
                    </div>
                    <div class="card-footer-info">
                        <span class="date">18 Oct 2020</span>
                        <span class="views">9,906 views</span>
                    </div>
                </div>
            </div>

            <!-- Item 2 -->
            <div class="col-xl-3 col-lg-4 col-md-6 col-sm-12 mb-5">
                <div class="gallery-card">
                    <div class="img-container">
                        <img src="https://picsum.photos/id/20/400/250" alt="Plants">
                        <div class="img-overlay">
                            <i class="fas fa-expand"></i>
                        </div>
                    </div>
                    <div class="card-footer-info">
                        <span class="date">14 Oct 2020</span>
                        <span class="views">16,100 views</span>
                    </div>
                </div>
            </div>

            <!-- Item 3 -->
            <div class="col-xl-3 col-lg-4 col-md-6 col-sm-12 mb-5">
                <div class="gallery-card">
                    <div class="img-container">
                        <img src="https://picsum.photos/id/15/400/250" alt="Forest">
                        <div class="img-overlay">
                            <i class="fas fa-expand"></i>
                        </div>
                    </div>
                    <div class="card-footer-info">
                        <span class="date">12 Oct 2020</span>
                        <span class="views">12,460 views</span>
                    </div>
                </div>
            </div>

            <!-- Item 4 -->
            <div class="col-xl-3 col-lg-4 col-md-6 col-sm-12 mb-5">
                <div class="gallery-card">
                    <div class="img-container">
                        <img src="https://picsum.photos/id/30/400/250" alt="Headphones">
                        <div class="img-overlay">
                            <i class="fas fa-expand"></i>
                        </div>
                    </div>
                    <div class="card-footer-info">
                        <span class="date">10 Oct 2020</span>
                        <span class="views">11,402 views</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer-bg py-4 text-center">
        <p class="text-muted mb-0">Copyright 2026 KRSS</p>
    </footer>

</body>
</html>
